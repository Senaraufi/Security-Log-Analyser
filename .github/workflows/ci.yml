name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

env:
  CARGO_TERM_COLOR: always

defaults:
  run:
    working-directory: security_api

jobs:
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo registry and build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            security_api/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('security_api/**/Cargo.toml') }}
          restore-keys: ${{ runner.os }}-cargo-

      # Build and tests are the blocking gates.
      - name: Build
        run: cargo build --workspace --verbose

      - name: Run tests
        run: cargo test --workspace --verbose

      # Formatting and lints are informational for now (pre-existing debt).
      # TODO: flip these to blocking once the workspace is fmt/clippy clean.
      - name: Check formatting
        run: cargo fmt --all -- --check
        continue-on-error: true

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
        continue-on-error: true
